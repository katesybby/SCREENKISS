<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCREENKISS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="movieModeOverlay" class="movie-mode-overlay hidden" aria-hidden="true">
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>
    <div class="bulb-strip bulb-strip-left"></div>
    <div class="bulb-strip bulb-strip-right"></div>
  </div>

  <div class="bg-decor decor-dots"></div>
  <div class="bg-decor decor-stars"></div>

  <div class="site-shell">
    <header class="hero">
      <div class="hero-topbar">
        <div>
          <p class="tiny-label">CURATED SCREEN ARCHIVE</p>
          <h1>SCREENKISS</h1>
          <p class="hero-sub">pink velvet cinema, sorted by mood and damage level</p>
        </div>

        <div class="top-actions">
          <button id="lightDarkToggleBtn" class="theme-toggle">Light Mode</button>
          <button id="movieTimeBtn" class="theme-toggle movie-time-btn">Movie Time</button>
          <button id="loginBtn" class="theme-toggle login-btn">Log In</button>
        </div>
      </div>

      <section class="hero-featured">
        <div class="featured-panel">
          <button id="featuredPrevBtn" class="carousel-arrow left" aria-label="Previous featured">‹</button>
          <div id="featuredDisplay" class="featured-display"></div>
          <button id="featuredNextBtn" class="carousel-arrow right" aria-label="Next featured">›</button>
        </div>

        <div class="featured-bottom-actions">
          <button class="secondary-btn" id="featuredOpenBtnExternal" type="button">Open Details</button>
          <button class="primary-btn" id="featuredWatchBtnExternal" type="button">Watch</button>
        </div>
      </section>
    </header>

    <main class="main-content">
      <div class="top-control-rows">
        <div class="split-tabs">
          <nav class="top-tabs tabs-left" id="typeTabs" aria-label="Media type">
            <button class="top-tab active" data-type="movie">Movies</button>
            <button class="top-tab" data-type="show">TV Shows</button>
            <button class="top-tab" data-type="anime">Anime</button>
          </nav>

          <nav class="top-tabs tabs-right" id="statusTabs" aria-label="Watch status">
            <button class="top-tab active" data-status="unwatched">Unwatched</button>
            <button class="top-tab" data-status="watched">Watched</button>
            <button class="top-tab" data-status="all">All</button>
          </nav>
        </div>
      </div>

      <section class="page-layout" id="pageLayout">
        <aside id="rankingSidebar" class="ranking-sidebar hidden">
          <div class="sidebar-panel">
            <div class="sidebar-head">
              <h2>Top Rated</h2>
              <p id="sidebarSubtitle">Best in category</p>
            </div>
            <div id="rankingList" class="ranking-list"></div>
          </div>
        </aside>

        <section class="content-column">
          <section class="controls-panel">
            <div class="control-group search-group">
              <label for="searchInput">Search</label>
              <input id="searchInput" type="text" placeholder="title, vibe, hint, adjectives..." />
            </div>

            <div class="control-group">
              <label for="vibeSelect">Vibe</label>
              <select id="vibeSelect">
                <option value="all">All vibes</option>
              </select>
            </div>

            <div class="control-group">
              <label for="intensitySelect">Damage Level</label>
              <select id="intensitySelect">
                <option value="all">All levels</option>
                <option value="glossy">Glossy</option>
                <option value="messy">Messy</option>
                <option value="unwell">Unwell</option>
              </select>
            </div>

            <div class="control-group">
              <label for="sortSelect">Sort</label>
              <select id="sortSelect">
                <option value="date-desc">Newest → Oldest</option>
                <option value="date-asc">Oldest → Newest</option>
                <option value="title-asc">Title A–Z</option>
                <option value="title-desc">Title Z–A</option>
                <option value="rating-desc">Highest Rated</option>
                <option value="rating-asc">Lowest Rated</option>
              </select>
            </div>

            <div class="control-group" id="ratingFilterWrap">
              <label for="ratingFilterSelect">Kisses</label>
              <select id="ratingFilterSelect">
                <option value="all">All ratings</option>
                <option value="4.5">4.5+ kisses</option>
                <option value="4">4+ kisses</option>
                <option value="3.5">3.5+ kisses</option>
                <option value="3">3+ kisses</option>
                <option value="2">2+ kisses</option>
              </select>
            </div>

            <div class="control-group checkbox-group">
              <label class="checkbox-label nostalgia-label">
                <input id="nostalgicToggle" type="checkbox" />
                <span>✨ Nostalgia ✨</span>
              </label>
            </div>

            <div class="control-actions">
              <button id="clearFiltersBtn" class="secondary-btn">Clear</button>
              <button id="randomPickBtn" class="primary-btn">Pick for Me</button>
            </div>
          </section>

          <section class="results-header">
            <div>
              <h2 id="resultsTitle">Movies</h2>
              <p id="resultsMeta">0 titles</p>
            </div>
          </section>

          <section id="cardGrid" class="card-grid"></section>
        </section>
      </section>
    </main>
  </div>

  <div id="detailsModal" class="modal hidden">
    <div id="modalBackdrop" class="modal-backdrop"></div>
    <div class="modal-card">
      <button id="closeModalBtn" class="modal-close" aria-label="Close">×</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
